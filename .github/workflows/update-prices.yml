name: 株価更新

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 株価を取得してprices.jsonを作る
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, datetime

          with open('tickers.json', encoding='utf-8') as f:
              tickers = json.load(f)['tickers']

          ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36'
          prices = {}
          for code in tickers:
              url = f'https://query1.finance.yahoo.com/v8/finance/chart/{code}.T?interval=1d&range=5d'
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': ua})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      data = json.loads(r.read().decode('utf-8'))
                  result = data['chart']['result'][0]
                  meta = result['meta']
                  closes = [c for c in result['indicators']['quote'][0]['close'] if c is not None]
                  price = meta.get('regularMarketPrice') or (closes[-1] if closes else None)
                  if price is not None:
                      d = datetime.datetime.fromtimestamp(meta['regularMarketTime'], datetime.timezone.utc)
                      prices[code] = {'close': round(float(price), 1), 'date': d.strftime('%Y-%m-%d')}
                      print(f'{code}: {price}')
                  else:
                      print(f'{code}: データなし')
              except Exception as e:
                  print(f'{code}: 取得失敗 {type(e).__name__}: {e}')

          jst = datetime.timezone(datetime.timedelta(hours=9))
          result = {
              'updated': datetime.datetime.now(jst).isoformat(timespec='minutes'),
              'prices': prices,
          }
          with open('prices.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=1)
          print(f'{len(prices)}/{len(tickers)} 件取得できた')
          PYEOF

      - name: prices.jsonをリポジトリに保存
        run: |
          git config user.name 'price-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add prices.json
          git diff --cached --quiet || git commit -m '株価更新'
          git push

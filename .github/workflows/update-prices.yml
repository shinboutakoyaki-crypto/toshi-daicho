name: 株価更新

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 平日18時(日本時間)
  workflow_dispatch:          # 手動実行ボタン

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 株価を取得してprices.jsonを作る
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, datetime

          with open('tickers.json', encoding='utf-8') as f:
              tickers = json.load(f)['tickers']

          prices = {}
          for code in tickers:
              url = f'https://stooq.com/q/l/?s={code}.jp&f=sd2t2ohlcv&h&e=csv'
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      lines = r.read().decode('utf-8', 'replace').strip().splitlines()
                  cols = lines[1].split(',')
                  if len(cols) > 6 and cols[6] not in ('N/D', ''):
                      prices[code] = {'close': float(cols[6]), 'date': cols[1]}
                  else:
                      print(f'{code}: データなし')
              except Exception as e:
                  print(f'{code}: 取得失敗 {e}')

          jst = datetime.timezone(datetime.timedelta(hours=9))
          result = {
              'updated': datetime.datetime.now(jst).isoformat(timespec='minutes'),
              'prices': prices,
          }
          with open('prices.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=1)
          print(f'{len(prices)}/{len(tickers)} 件取得できた')
          PYEOF

      - name: prices.jsonをリポジトリに保存
        run: |
          git config user.name 'price-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add prices.json
          git diff --cached --quiet || git commit -m '株価更新'
          git push

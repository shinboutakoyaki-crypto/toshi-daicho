<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>投資台帳</title>
<style>
  :root{
    --bg:#F5F7F6; --card:#FFFFFF; --ink:#1B2723; --sub:#6E7D77;
    --line:#E4E9E6; --green:#1E6B52; --green-soft:#E7F1ED;
    --plus:#C2402F; --minus:#2B5FA5; --perk:#B98A2E; --divi:#4A7D68;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
  }
  .wrap{max-width:560px; margin:0 auto; padding:18px 14px 100px;}
  header{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;}
  .logo{font-size:18px; font-weight:800;}
  .logo span{color:var(--green);}
  .date{font-size:12px; color:var(--sub);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:12px;}
  .eyebrow{font-size:11px; letter-spacing:.12em; color:var(--sub); font-weight:600; margin-bottom:8px;}
  .num{font-variant-numeric:tabular-nums;}
  .plus{color:var(--plus);} .minus{color:var(--minus);} .zero{color:var(--sub);}
  .hero-num{font-size:38px; font-weight:800; letter-spacing:-0.01em;}
  .band{display:flex; height:8px; border-radius:4px; overflow:hidden; margin:14px 0 10px;}
  .chips{display:flex; gap:8px; margin-top:12px;}
  .chip{flex:1; background:#FAFBFA; border:1px solid var(--line); border-radius:10px; padding:8px 10px;}
  .chip .t{display:flex; align-items:center; gap:5px; font-size:11px; color:var(--sub); font-weight:600;}
  .chip .dot{width:8px; height:8px; border-radius:2px; display:inline-block;}
  .chip .v{font-size:14px; font-weight:700; margin-top:2px;}
  .row{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .tag{font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; flex-shrink:0;}
  .row .mid{flex:1; min-width:0;}
  .row .name{font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row .meta{font-size:12px; color:var(--sub);}
  .row .amt{font-size:15px; font-weight:700;}
  .del{border:none; background:none; color:var(--sub); font-size:18px; padding:4px 6px; cursor:pointer;}
  .empty{color:var(--sub); font-size:14px; text-align:center; padding:16px 0; line-height:1.8;}
  /* グラフ */
  .chart{position:relative; height:170px; display:flex; align-items:stretch; gap:3px; margin-top:10px;}
  .col{flex:1; display:flex; flex-direction:column; position:relative; cursor:pointer;}
  .col .up{flex:1; display:flex; align-items:flex-end;}
  .col .down{flex:1; display:flex; align-items:flex-start;}
  .col .bar{width:100%; border-radius:3px 3px 0 0;}
  .col .bar.neg{border-radius:0 0 3px 3px;}
  .zeroline{position:absolute; left:0; right:0; height:1px; background:var(--line);}
  .xlabels{display:flex; gap:3px; margin-top:4px;}
  .xlabels div{flex:1; text-align:center; font-size:9px; color:var(--sub);}
  .chart-detail{font-size:13px; color:var(--sub); margin-top:8px; min-height:1.4em;}
  /* フォーム */
  label.f{display:block; margin-bottom:12px;}
  label.f .l{font-size:12px; color:var(--sub); font-weight:600; margin-bottom:4px;}
  input,select{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line);
    font-size:16px; font-family:inherit; background:#FBFCFB; color:var(--ink); outline:none;
  }
  select.small{width:auto; padding:4px 8px; font-size:13px;}
  .btn{
    display:block; width:100%; padding:12px 16px; border:none; border-radius:12px;
    font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
    background:var(--green); color:#fff;
  }
  .btn.ghost{background:var(--green-soft); color:var(--green);}
  .btn.danger{background:#FBEDEA; color:var(--plus);}
  .btn:disabled{opacity:.4;}
  .btnrow{display:flex; gap:10px;}
  .btnrow .btn{width:auto; flex:1;}
  .seg{display:flex; gap:8px; margin-bottom:14px;}
  .seg button{
    flex:1; padding:10px 0; border-radius:10px; font-size:14px; font-weight:700;
    font-family:inherit; border:1.5px solid var(--line); background:#FBFCFB; color:var(--sub); cursor:pointer;
  }
  .hint{font-size:12px; color:var(--sub); background:#FAFBFA; border:1px solid var(--line);
    border-radius:10px; padding:8px 10px; margin-bottom:14px; line-height:1.6;}
  .toast{text-align:center; color:var(--green); font-weight:700; font-size:13px; margin-top:10px; min-height:1.2em;}
  .banner{background:#FFF6E5; color:#8a6a1f; border:1px solid #F0E2BF; border-radius:10px;
    padding:10px 12px; font-size:13px; line-height:1.7; margin-bottom:12px; display:none;}
  /* 保有株 */
  .h-head{display:flex; justify-content:space-between; align-items:baseline;}
  .h-name{font-size:16px; font-weight:700;}
  .h-code{font-size:12px; color:var(--sub); margin-left:6px; font-weight:400;}
  .h-edit{border:1px solid var(--line); background:#FBFCFB; border-radius:8px; font-size:12px;
    padding:4px 10px; color:var(--green); font-weight:700; cursor:pointer; font-family:inherit;}
  .h-meta{display:flex; gap:14px; margin-top:8px; font-size:13px; color:var(--sub); flex-wrap:wrap;}
  .h-foot{display:flex; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid var(--line); align-items:baseline;}
  .h-upd{font-size:11px; color:var(--sub); margin-top:6px;}
  .note{font-size:12px; color:var(--sub); text-align:center; margin-top:4px;}
  /* ナビ */
  nav{position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--line);
    display:flex; justify-content:center; padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  nav .inner{display:flex; width:100%; max-width:560px; gap:6px;}
  nav button{flex:1; padding:11px 0; border:none; border-radius:12px; font-family:inherit;
    font-size:13px; font-weight:700; background:transparent; color:var(--sub); cursor:pointer;}
  nav button.on{background:var(--green-soft); color:var(--green);}
  .filters{display:flex; gap:8px; margin-bottom:12px;}
  .filters button{flex:1; padding:8px 0; border-radius:10px; font-size:13px; font-weight:700;
    font-family:inherit; border:1px solid var(--line); background:var(--card); color:var(--sub); cursor:pointer;}
  .filters button.on{border-color:var(--green); background:var(--green-soft); color:var(--green);}
  .backup-note{font-size:12px; color:var(--sub); line-height:1.7; margin-top:8px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><span>投資</span>台帳</div>
    <div class="date" id="todayLabel"></div>
  </header>
  <div class="banner" id="storageBanner">
    この開き方ではデータを保存できません。ページを閉じると入力内容が消えます。ホーム画面に追加した公開URLから開くと保存されます。
  </div>
  <main id="view"></main>
</div>
<nav>
  <div class="inner">
    <button data-tab="home" class="on">ホーム</button>
    <button data-tab="holdings">保有株</button>
    <button data-tab="add">＋ 追加</button>
    <button data-tab="history">履歴</button>
  </div>
</nav>

<script>
"use strict";
// ───────── 基本設定 ─────────
const KEY = "toshi-daicho-v1";
const TYPE_META = {
  realized: { label:"売買", color:"var(--green)", raw:"#1E6B52" },
  dividend: { label:"配当", color:"var(--divi)",  raw:"#4A7D68" },
  perk:     { label:"優待", color:"var(--perk)",  raw:"#B98A2E" },
};
const today = () => new Date().toISOString().slice(0,10);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const yen = (n, sign=false) => {
  const v = Math.round(Number(n)||0);
  const s = Math.abs(v).toLocaleString("ja-JP");
  if (sign) return (v>0?"+":v<0?"−":"±") + "¥" + s;
  return (v<0?"−":"") + "¥" + s;
};
const pn = (n) => n>0 ? "plus" : n<0 ? "minus" : "zero";

// ───────── 保存(localStorage / 使えない環境ではメモリ) ─────────
let memoryOnly = false;
let mem = null;
function loadData(){
  try{
    const raw = localStorage.getItem(KEY);
    if (raw) return JSON.parse(raw);
    localStorage.setItem("__test__","1"); localStorage.removeItem("__test__");
    return { records:[], holdings:[] };
  }catch(e){
    memoryOnly = true;
    document.getElementById("storageBanner").style.display = "block";
    return mem || { records:[], holdings:[] };
  }
}
function saveData(d){
  if (memoryOnly){ mem = d; return; }
  try{ localStorage.setItem(KEY, JSON.stringify(d)); }
  catch(e){ alert("保存に失敗しました。空き容量を確認してください。"); }
}

let data = loadData();
let tab = "home";
let editingHolding = null;   // null=一覧 / {}=新規 / holding=編集
let historyFilter = "all";
let addType = "realized";
let chartYear = null;
let chartDetail = "";

function commit(){ saveData(data); render(); }

// ───────── 集計 ─────────
function totals(){
  const t = { realized:0, dividend:0, perk:0 };
  data.records.forEach(r => { t[r.type] = (t[r.type]||0) + (Number(r.amount)||0); });
  return t;
}
function unrealized(){
  return data.holdings.reduce((s,h)=> s + ((Number(h.currentPrice)||0)-(Number(h.avgPrice)||0))*(Number(h.shares)||0), 0);
}
function years(){
  const ys = [...new Set(data.records.map(r => (r.date||"").slice(0,4)).filter(Boolean))].sort().reverse();
  return ys.length ? ys : [String(new Date().getFullYear())];
}
function monthly(year){
  const arr = Array.from({length:12}, () => 0);
  data.records.forEach(r => {
    if ((r.date||"").slice(0,4) === year){
      const m = parseInt(r.date.slice(5,7),10)-1;
      if (m>=0 && m<12) arr[m] += Number(r.amount)||0;
    }
  });
  return arr;
}

// ───────── 描画部品 ─────────
function recordRowHTML(r, deletable){
  const m = TYPE_META[r.type] || TYPE_META.realized;
  const a = Number(r.amount)||0;
  return `<div class="row">
    <span class="tag" style="color:${m.raw}; background:${m.raw}22">${m.label}</span>
    <div class="mid">
      <div class="name">${esc(r.name)||"(名称なし)"}</div>
      <div class="meta">${esc(r.date)}${r.memo ? " ・ " + esc(r.memo) : ""}</div>
    </div>
    <span class="amt num ${pn(a)}">${yen(a,true)}</span>
    ${deletable ? `<button class="del" data-del-record="${r.id}">×</button>` : ""}
  </div>`;
}

// ───────── ホーム ─────────
function homeHTML(){
  const t = totals();
  const grand = t.realized + t.dividend + t.perk;
  const un = unrealized();
  const ys = years();
  if (!chartYear || !ys.includes(chartYear)) chartYear = ys[0];
  const mo = monthly(chartYear);
  const yearTotal = mo.reduce((a,b)=>a+b,0);
  const maxAbs = Math.max(...mo.map(Math.abs), 1);
  const hasNeg = mo.some(v => v<0);

  const absSum = Math.abs(t.realized)+Math.abs(t.dividend)+Math.abs(t.perk);
  const band = absSum>0 ? ["realized","dividend","perk"]
    .map(k => ({w: Math.abs(t[k])/absSum*100, c: TYPE_META[k].raw}))
    .filter(b => b.w>0) : [];

  const chips = ["realized","dividend","perk"].map(k => `
    <div class="chip">
      <div class="t"><span class="dot" style="background:${TYPE_META[k].raw}"></span>${TYPE_META[k].label}</div>
      <div class="v num ${pn(t[k])}">${yen(t[k],true)}</div>
    </div>`).join("");

  const cols = mo.map((v,i)=>{
    const hPct = Math.abs(v)/maxAbs * 92;
    const bar = `<div class="bar ${v<0?"neg":""}" style="height:${v===0?0:Math.max(hPct,2)}%; background:${v>=0?"var(--plus)":"var(--minus)"}"></div>`;
    return `<div class="col" data-month="${i}">
      <div class="up">${v>0?bar:""}</div>
      ${hasNeg?`<div class="down">${v<0?bar:""}</div>`:""}
    </div>`;
  }).join("");

  const recent = [...data.records].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,5);

  return `
  <div class="card" style="padding:22px">
    <div class="eyebrow">累計トータル損益(実現+配当+優待)</div>
    <div class="hero-num num ${pn(grand)}">${yen(grand,true)}</div>
    ${band.length?`<div class="band">${band.map(b=>`<div style="width:${b.w}%;background:${b.c}"></div>`).join("")}</div>`:""}
    <div class="chips">${chips}</div>
  </div>

  <div class="card" style="display:flex; justify-content:space-between; align-items:center">
    <div>
      <div class="eyebrow">含み損益(未確定・トータルには含めません)</div>
      <div class="num ${pn(un)}" style="font-size:20px; font-weight:700">${yen(un,true)}</div>
    </div>
    <div style="font-size:12px; color:var(--sub)">保有 ${data.holdings.length} 銘柄</div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:baseline">
      <div class="eyebrow">月別損益(売買+配当+優待)</div>
      <select class="small" id="yearSel">${years().map(y=>`<option value="${y}" ${y===chartYear?"selected":""}>${y}年</option>`).join("")}</select>
    </div>
    <div style="font-size:13px; color:var(--sub)">${chartYear}年 合計
      <span class="num ${pn(yearTotal)}" style="font-weight:700">${yen(yearTotal,true)}</span>
    </div>
    ${data.records.length===0
      ? `<div class="empty">まだ記録がありません。<br>下の「＋ 追加」から最初の1件を記録しましょう。</div>`
      : `<div class="chart">${hasNeg?`<div class="zeroline" style="top:50%"></div>`:""}${cols}</div>
         <div class="xlabels">${Array.from({length:12},(_,i)=>`<div>${i+1}</div>`).join("")}</div>
         <div class="chart-detail">${chartDetail || "棒をタップすると金額が見られます"}</div>`}
  </div>

  <div class="card">
    <div class="eyebrow">直近の記録</div>
    ${recent.length===0 ? `<div class="empty">記録はまだありません。</div>` : recent.map(r=>recordRowHTML(r,false)).join("")}
  </div>`;
}

// ───────── 保有株 ─────────
function holdingsHTML(){
  if (editingHolding) return holdingFormHTML(editingHolding);
  const list = data.holdings.map(h=>{
    const pl = ((Number(h.currentPrice)||0)-(Number(h.avgPrice)||0))*(Number(h.shares)||0);
    const val = (Number(h.currentPrice)||0)*(Number(h.shares)||0);
    return `<div class="card">
      <div class="h-head">
        <div class="h-name">${esc(h.name)}${h.code?`<span class="h-code">${esc(h.code)}</span>`:""}</div>
        <button class="h-edit" data-edit-holding="${h.id}">編集</button>
      </div>
      <div class="h-meta">
        <span class="num">${(Number(h.shares)||0).toLocaleString()} 株</span>
        <span>取得 <span class="num">${yen(h.avgPrice)}</span></span>
        <span>現在 <span class="num">${yen(h.currentPrice)}</span></span>
      </div>
      <div class="h-foot">
        <span style="font-size:13px; color:var(--sub)">評価額 <span class="num" style="font-weight:700; color:var(--ink)">${yen(val)}</span></span>
        <span class="num ${pn(pl)}" style="font-size:15px; font-weight:800">${yen(pl,true)}</span>
      </div>
      ${h.updatedAt?`<div class="h-upd">株価更新日: ${esc(h.updatedAt)}</div>`:""}
    </div>`;
  }).join("");
  return `
    <button class="btn" id="addHoldingBtn" style="margin-bottom:12px">+ 銘柄を追加</button>
    ${data.holdings.length===0
      ? `<div class="card"><div class="empty">保有している銘柄を追加すると、<br>評価損益がここに表示されます。</div></div>`
      : list + `<div class="note">「編集」から現在の株価を更新できます</div>`}`;
}

function holdingFormHTML(h){
  const isEdit = !!h.id;
  return `<div class="card">
    <div style="font-size:16px; font-weight:800; margin-bottom:14px">${isEdit?"銘柄を編集":"銘柄を追加"}</div>
    <label class="f"><div class="l">銘柄名(必須)</div><input id="hName" value="${esc(h.name||"")}" placeholder="例: トヨタ自動車"></label>
    <label class="f"><div class="l">証券コード(任意)</div><input id="hCode" value="${esc(h.code||"")}" placeholder="例: 7203" inputmode="numeric"></label>
    <label class="f"><div class="l">保有株数(必須)</div><input id="hShares" value="${h.shares??""}" placeholder="例: 100" inputmode="decimal" type="number"></label>
    <label class="f"><div class="l">平均取得単価(円)</div><input id="hAvg" value="${h.avgPrice??""}" placeholder="例: 2500" inputmode="decimal" type="number"></label>
    <label class="f"><div class="l">現在の株価(円)</div><input id="hCur" value="${h.currentPrice??""}" placeholder="例: 2650" inputmode="decimal" type="number"></label>
    <div class="btnrow" style="margin-top:6px">
      <button class="btn ghost" id="hCancel" style="flex:1">キャンセル</button>
      <button class="btn" id="hSave" style="flex:2">保存する</button>
    </div>
    ${isEdit?`<button class="btn danger" id="hDelete" style="margin-top:10px">この銘柄を削除</button>`:""}
  </div>`;
}

// ───────── 追加フォーム ─────────
function addHTML(){
  const hint = {
    realized:"売却して確定した損益を入力します。損失のときはマイナス(例: -12000)で入力してください。",
    dividend:"受け取った配当金(税引き後の手取り額がおすすめ)を入力します。",
    perk:"優待の中身を金額に換算して入力します(例: クオカード3000円分 → 3000)。",
  }[addType];
  return `<div class="card">
    <div style="font-size:16px; font-weight:800; margin-bottom:14px">記録を追加</div>
    <div class="seg">
      ${Object.entries(TYPE_META).map(([k,m])=>`
        <button data-type="${k}" style="${addType===k?`border-color:${m.raw}; background:${m.raw}14; color:${m.raw}`:""}">${m.label}</button>`).join("")}
    </div>
    <div class="hint">${hint}</div>
    <label class="f"><div class="l">日付</div><input id="rDate" type="date" value="${today()}"></label>
    <label class="f"><div class="l">${addType==="perk"?"優待の内容":"銘柄名"}</div>
      <input id="rName" placeholder="${addType==="perk"?"例: イオン クオカード":"例: 任天堂"}"></label>
    <label class="f"><div class="l">金額(円)</div>
      <input id="rAmount" placeholder="${addType==="realized"?"例: 25000(損失は -12000)":"例: 3000"}" inputmode="numeric" type="number"></label>
    <label class="f"><div class="l">メモ(任意)</div><input id="rMemo" placeholder="例: NISA口座 / 100株分"></label>
    <button class="btn" id="rSave">保存する</button>
    <div class="toast" id="rToast"></div>
  </div>`;
}

// ───────── 履歴 ─────────
function historyHTML(){
  const list = [...data.records]
    .filter(r => historyFilter==="all" || r.type===historyFilter)
    .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  return `
  <div class="filters">
    ${[["all","すべて"],["realized","売買"],["dividend","配当"],["perk","優待"]]
      .map(([k,l])=>`<button data-filter="${k}" class="${historyFilter===k?"on":""}">${l}</button>`).join("")}
  </div>
  <div class="card">
    ${list.length===0 ? `<div class="empty">該当する記録がありません。</div>` : list.map(r=>recordRowHTML(r,true)).join("")}
  </div>
  <div class="card">
    <div class="eyebrow">データ管理</div>
    <div class="btnrow">
      <button class="btn ghost" id="backupBtn">バックアップを保存</button>
      <button class="btn ghost" id="restoreBtn">復元する</button>
    </div>
    <input type="file" id="restoreFile" accept=".json" style="display:none">
    <div class="backup-note">
      バックアップはファイル(.json)としてスマホに保存されます。機種変更やデータ消去に備えて、月に1回ほど保存しておくと安心です。
    </div>
  </div>`;
}

// ───────── 画面切り替えとイベント ─────────
function render(){
  document.getElementById("todayLabel").textContent = today();
  const view = document.getElementById("view");
  view.innerHTML = { home:homeHTML, holdings:holdingsHTML, add:addHTML, history:historyHTML }[tab]();
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on", b.dataset.tab===tab));
  bind();
}

function bind(){
  // グラフ
  const sel = document.getElementById("yearSel");
  if (sel) sel.onchange = e => { chartYear = e.target.value; chartDetail=""; render(); };
  document.querySelectorAll(".col").forEach(c => c.onclick = () => {
    const i = Number(c.dataset.month);
    const v = monthly(chartYear)[i];
    chartDetail = `${chartYear}年${i+1}月: ${yen(v,true)}`;
    render();
  });
  // 保有株
  const ab = document.getElementById("addHoldingBtn");
  if (ab) ab.onclick = () => { editingHolding = {}; render(); };
  document.querySelectorAll("[data-edit-holding]").forEach(b => b.onclick = () => {
    editingHolding = data.holdings.find(h=>h.id===b.dataset.editHolding); render();
  });
  const hs = document.getElementById("hSave");
  if (hs) hs.onclick = () => {
    const name = document.getElementById("hName").value.trim();
    const shares = Number(document.getElementById("hShares").value);
    if (!name || !(shares>0)) { alert("銘柄名と保有株数(1以上)を入力してください。"); return; }
    const h = {
      id: editingHolding.id || uid(), name,
      code: document.getElementById("hCode").value.trim(),
      shares,
      avgPrice: Number(document.getElementById("hAvg").value)||0,
      currentPrice: Number(document.getElementById("hCur").value)||0,
      updatedAt: today(),
    };
    const i = data.holdings.findIndex(x=>x.id===h.id);
    if (i>=0) data.holdings[i]=h; else data.holdings.push(h);
    editingHolding = null; commit();
  };
  const hc = document.getElementById("hCancel");
  if (hc) hc.onclick = () => { editingHolding = null; render(); };
  const hd = document.getElementById("hDelete");
  if (hd) hd.onclick = () => {
    if (confirm("この銘柄を削除しますか?")){
      data.holdings = data.holdings.filter(x=>x.id!==editingHolding.id);
      editingHolding = null; commit();
    }
  };
  // 追加フォーム
  document.querySelectorAll(".seg [data-type]").forEach(b => b.onclick = () => { addType = b.dataset.type; render(); });
  const rs = document.getElementById("rSave");
  if (rs) rs.onclick = () => {
    const date = document.getElementById("rDate").value;
    const name = document.getElementById("rName").value.trim();
    const amount = document.getElementById("rAmount").value;
    if (!date || !name || amount==="" || isNaN(Number(amount))) { alert("日付・名前・金額を入力してください。"); return; }
    data.records.push({ id:uid(), type:addType, date, name, amount:Number(amount),
      memo: document.getElementById("rMemo").value.trim() });
    saveData(data);
    document.getElementById("rName").value=""; document.getElementById("rAmount").value=""; document.getElementById("rMemo").value="";
    document.getElementById("rToast").textContent = "保存しました ✓";
    setTimeout(()=>{ const t=document.getElementById("rToast"); if(t) t.textContent=""; }, 1800);
  };
  // 履歴
  document.querySelectorAll("[data-filter]").forEach(b => b.onclick = () => { historyFilter=b.dataset.filter; render(); });
  document.querySelectorAll("[data-del-record]").forEach(b => b.onclick = () => {
    if (confirm("この記録を削除しますか?")){
      data.records = data.records.filter(r=>r.id!==b.dataset.delRecord); commit();
    }
  });
  // バックアップ
  const bb = document.getElementById("backupBtn");
  if (bb) bb.onclick = () => {
    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `投資台帳バックアップ_${today()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
  };
  const rb = document.getElementById("restoreBtn");
  if (rb) rb.onclick = () => document.getElementById("restoreFile").click();
  const rf = document.getElementById("restoreFile");
  if (rf) rf.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const d = JSON.parse(reader.result);
        if (!Array.isArray(d.records) || !Array.isArray(d.holdings)) throw 0;
        if (confirm("現在のデータをバックアップの内容で置き換えます。よろしいですか?")){
          data = d; commit();
        }
      }catch(_){ alert("このファイルは復元できません。投資台帳のバックアップファイル(.json)を選んでください。"); }
    };
    reader.readAsText(file);
  };
}

document.querySelectorAll("nav button").forEach(b => b.onclick = () => {
  tab = b.dataset.tab; editingHolding = null; chartDetail = ""; render();
});
render();
</script>
</body>
</html>
